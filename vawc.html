<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VAWC Records</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      background: #fafafa url('https://raw.githubusercontent.com/tiptip123/Barangay-Management-System/main/tankulan.jpg') no-repeat top center fixed; 
      background-size: contain; 
      margin: 0;
      padding: 20px;
    }
    .container { 
      max-width: 1200px; 
      margin: auto; 
      background: rgba(255, 255, 255, 0.95); 
      padding: 2rem; 
      border-radius: 8px; 
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08); 
    }
    h2 { 
      text-align: center; 
      color: #2c3e50; 
      margin-bottom: 1.5rem; 
      margin-top: 0;
    }
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 1.5rem; 
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }
    .header a { 
      color: #2c3e50; 
      text-decoration: none; 
      font-weight: 500; 
    }
    .header a:hover { 
      text-decoration: underline; 
    }
    .header button { 
      background: none; 
      border: none; 
      cursor: pointer; 
      font-size: 1rem; 
      color: #2c3e50; 
      margin-left: 10px;
    }
    .search-bar { 
      text-align: center; 
      margin-bottom: 1.5rem; 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 0.5rem; 
      align-items: center; 
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 6px;
    }
    .search-bar input[type="text"] { 
      width: 280px; 
      padding: .5rem; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
    }
    .search-bar input[type="date"] { 
      padding: .5rem; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
    }
    .search-bar label { 
      font-size: 0.9rem; 
      color: #555; 
      font-weight: 500; 
    }
    .search-bar .date-group { 
      display: flex; 
      align-items: center; 
      gap: 0.5rem; 
    }
    .search-bar .clear-btn { 
      padding: .5rem 1rem; 
      background: #95a5a6; 
      color: #fff; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.9rem; 
    }
    .search-bar .clear-btn:hover { 
      background: #7f8c8d; 
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 1rem; 
      font-size: 0.85rem; 
      background: #fff;
    }
    th, td { 
      border: 1px solid #e0e0e0; 
      padding: .75rem; 
      text-align: left; 
      vertical-align: top; 
    }
    th { 
      background: #2c3e50; 
      color: #fff; 
      white-space: nowrap; 
      font-weight: 600;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    tr:hover {
      background-color: #f1f1f1;
    }
    .action-buttons, .inline-actions { 
      display: flex; 
      gap: 0.3rem; 
    }
    .action-btn { 
      padding: .25rem .5rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.8rem; 
      transition: background .2s; 
    }
    .edit-btn { 
      background: #3498db; 
      color: #fff; 
    }
    .edit-btn:hover { 
      background: #2980b9; 
    }
    .save-btn { 
      background: #27ae60; 
      color: #fff; 
    }
    .save-btn:hover { 
      background: #219a52; 
    }
    .cancel-btn { 
      background: #95a5a6; 
      color: #fff; 
    }
    .cancel-btn:hover { 
      background: #7f8c8d; 
    }
    .delete-btn { 
      background: #e74c3c; 
      color: #fff; 
    }
    .delete-btn:hover { 
      background: #c0392b; 
    }
    .editing {
      background-color: #fff9e6 !important;
      border: 2px solid #f39c12;
    }
    .editing td {
      padding: 0.5rem;
    }
    .editing input, .editing select, .editing textarea {
      width: 100%;
      padding: 0.4rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.85rem;
      box-sizing: border-box;
    }
    .editing textarea {
      min-height: 60px;
      resize: vertical;
    }
    @media print { 
      body { background: none !important; } 
      .container { box-shadow: none; max-width: 100%; padding: 0; background: #fff; } 
      .header, .search-bar, .action-buttons, .inline-actions { display: none !important; } 
      table { font-size: 0.7rem; } 
      th { background: #333 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; } 
      .editing { background-color: #fff !important; border: none !important; }
      input, select, textarea { display: none !important; }
    }
    @media (max-width: 900px) { 
      table, thead, tbody, tr, td, th { display: block; width: 100%; } 
      tr { margin-bottom: .8rem; border: 1px solid #ddd; } 
      td { border: none; position: relative; padding-left: 45%; } 
      td::before { content: attr(data-label); position: absolute; left: 0; width: 44%; padding-left: .5rem; font-weight: 600; color: #555; } 
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="index.html">← Back to Home</a>
    <div>
      <a href="add_vawc.html" id="addLink" style="display: none;">＋ Add New</a>
      <button onclick="printRecords()" id="printBtn" style="display: none;">🖨️ Print</button>
    </div>
  </div>

  <h2>VAWC Records</h2>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search Case #, Complainant, Respondent…">
    <div class="date-group">
      <label for="dateFrom">From:</label>
      <input type="date" id="dateFrom">
      <label for="dateTo">To:</label>
      <input type="date" id="dateTo">
      <button type="button" class="clear-btn" id="clearDateFilter">Clear</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Case No.</th>
        <th>File Date</th>
        <th>Complainant</th>
        <th>Age</th>
        <th>Birthdate</th>
        <th>Contact No.</th>
        <th>Address</th>
        <th>Type of Abuse</th>
        <th>Respondent</th>
        <th>Remarks</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
  const supabaseUrl = "https://zalttugtbsqcjshqzfet.supabase.co";
  const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphbHR0dWd0YnNxY2pzaHF6ZmV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTY4OTUsImV4cCI6MjA4ODU3Mjg5NX0.857tB9_t04GuLPHIGBIlew-C8JBjuikgTVtxcK748Z0";
  const sb = supabase.createClient(supabaseUrl, supabaseAnonKey);

  const tbody = document.getElementById('tableBody');
  const addLink = document.getElementById('addLink');
  const printBtn = document.getElementById('printBtn');
  let allRows = [];
  let currentVisibleRows = [];
  let editingRowId = null;

  // Helper function to calculate age from birthdate
  function calculateAge(birthdateStr) {
    if (!birthdateStr) return '';
    const birth = new Date(birthdateStr);
    const today = new Date();
    let age = today.getFullYear() - birth.getFullYear();
    const monthDiff = today.getMonth() - birth.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
      age--;
    }
    return age;
  }

  // Event delegation on tbody
  tbody.addEventListener('click', function(e) {
    const target = e.target;
    
    if (target.classList.contains('edit-btn')) {
      const id = target.dataset.id;
      startInlineEdit(id);
      return;
    }
    
    if (target.classList.contains('save-btn')) {
      const id = target.dataset.id;
      saveInlineEdit(id);
      return;
    }
    
    if (target.classList.contains('cancel-btn')) {
      const id = target.dataset.id;
      cancelInlineEdit(id);
      return;
    }
    
    if (target.classList.contains('delete-btn')) {
      const id = target.dataset.id;
      const caseNum = target.dataset.case;
      deleteRecord(id, caseNum);
      return;
    }
  });

  // Add event listener for birthdate changes on the fly
  tbody.addEventListener('change', function(e) {
    const target = e.target;
    if (target.id && target.id.startsWith('edit_birthdate_')) {
      const id = target.id.replace('edit_birthdate_', '');
      const ageInput = document.getElementById(`edit_age_${id}`);
      if (ageInput && target.value) {
        const calculatedAge = calculateAge(target.value);
        ageInput.value = calculatedAge;
      }
    }
  });

  function configureNav() {
    const userType = localStorage.getItem('userType');
    const isLoggedIn = userType === 'vawc';
    if (isLoggedIn) {
      addLink.style.display = 'inline';
      printBtn.style.display = 'inline';
    } else {
      addLink.style.display = 'none';
      printBtn.style.display = 'none';
    }
  }

  async function loadData() {
    const { data, error } = await sb.from('vawc_cases').select('*').order('created_at', { ascending: false });
    if (error) { console.error('Error:', error); return; }
    allRows = data || [];
    currentVisibleRows = allRows;
    renderRows(allRows);
  }

  function renderRows(rows) {
    tbody.innerHTML = '';
    const isAdmin = localStorage.getItem('userType') === 'vawc';
    currentVisibleRows = rows;

    rows.forEach(row => {
      const rowIdStr = String(row.id);
      const editIdStr = String(editingRowId);
      const isEditing = (editingRowId !== null) && (rowIdStr === editIdStr);

      let actionsHtml = '';
      if (isAdmin) {
        if (isEditing) {
          actionsHtml = `
            <div class="inline-actions">
              <button class="action-btn save-btn" data-id="${row.id}">✓ Save</button>
              <button class="action-btn cancel-btn" data-id="${row.id}">✕ Cancel</button>
            </div>
          `;
        } else {
          actionsHtml = `
            <div class="action-buttons">
              <button class="action-btn edit-btn" data-id="${row.id}">✏️ Edit</button>
              <button class="action-btn delete-btn" data-id="${row.id}" data-case="${row.case_number}">🗑️</button>
            </div>
          `;
        }
      } else {
        actionsHtml = '<span style="color: #999;">View Only</span>';
      }
      
      const tr = document.createElement('tr');
      if (isEditing) {
        tr.className = 'editing';
      }
      
      const val = (field) => row[field] !== undefined && row[field] !== null ? row[field] : '';
      
      tr.innerHTML = `
        <td data-label="Case No.">${isEditing ? `<input type="text" id="edit_case_${row.id}" value="${val('case_number')}">` : val('case_number')}</td>
        <td data-label="File Date">${isEditing ? `<input type="date" id="edit_file_date_${row.id}" value="${val('file_date')}">` : formatDate(val('file_date'))}</td>
        <td data-label="Complainant">${isEditing ? `<input type="text" id="edit_complainant_${row.id}" value="${val('complainant')}">` : val('complainant')}</td>
        <td data-label="Age">${isEditing ? `<input type="number" id="edit_age_${row.id}" value="${val('age')}">` : val('age')}</td>
        <td data-label="Birthdate">${isEditing ? `<input type="date" id="edit_birthdate_${row.id}" value="${val('birthdate')}">` : formatDate(val('birthdate'))}</td>
        <td data-label="Contact No.">${isEditing ? `<input type="tel" id="edit_contact_${row.id}" value="${val('contact_number')}">` : val('contact_number')}</td>
        <td data-label="Address">${isEditing ? `<input type="text" id="edit_address_${row.id}" value="${val('address')}">` : val('address')}</td>
        <td data-label="Type of Abuse">${isEditing ? `
          <select id="edit_abuse_${row.id}">
            <option value="">Select Type of Abuse</option>
            <option value="Physical Abuse" ${val('type_of_abuse') === 'Physical Abuse' ? 'selected' : ''}>Physical Abuse</option>
            <option value="Sexual Abuse" ${val('type_of_abuse') === 'Sexual Abuse' ? 'selected' : ''}>Sexual Abuse</option>
            <option value="Psychological Abuse" ${val('type_of_abuse') === 'Psychological Abuse' ? 'selected' : ''}>Psychological Abuse</option>
            <option value="Economic Abuse" ${val('type_of_abuse') === 'Economic Abuse' ? 'selected' : ''}>Economic Abuse</option>
            <option value="Verbal Abuse" ${val('type_of_abuse') === 'Verbal Abuse' ? 'selected' : ''}>Verbal Abuse</option>
          </select>` : val('type_of_abuse')}</td>
        <td data-label="Respondent">${isEditing ? `<input type="text" id="edit_respondent_${row.id}" value="${val('respondent')}">` : val('respondent')}</td>
        <td data-label="Remarks">${isEditing ? `<textarea id="edit_remarks_${row.id}">${val('remarks')}</textarea>` : val('remarks')}</td>
        <td data-label="Actions">${actionsHtml}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  document.getElementById('searchInput').addEventListener('input', filterRecords);
  document.getElementById('dateFrom').addEventListener('change', filterRecords);
  document.getElementById('dateTo').addEventListener('change', filterRecords);
  document.getElementById('clearDateFilter').addEventListener('click', () => {
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    filterRecords();
  });

  function filterRecords() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const fromDate = document.getElementById('dateFrom').value;
    const toDate = document.getElementById('dateTo').value;
    
    const filtered = allRows.filter(row => {
      const matchesSearch = row.case_number?.toLowerCase().includes(term) || row.complainant?.toLowerCase().includes(term) || row.respondent?.toLowerCase().includes(term);
      let matchesDate = true;
      if (fromDate || toDate) {
        const recordDate = row.file_date || '';
        if (fromDate && toDate) matchesDate = recordDate >= fromDate && recordDate <= toDate;
        else if (fromDate) matchesDate = recordDate >= fromDate;
        else if (toDate) matchesDate = recordDate <= toDate;
      }
      return matchesSearch && matchesDate;
    });
    
    renderRows(filtered);
  }

  function startInlineEdit(id) {
    if (editingRowId && String(editingRowId) !== String(id)) {
      cancelInlineEdit(editingRowId);
    }
    editingRowId = id;
    renderRows(currentVisibleRows);
  }

  function cancelInlineEdit(id) {
    editingRowId = null;
    renderRows(currentVisibleRows);
  }

  async function saveInlineEdit(id) {
    const row = allRows.find(r => String(r.id) === String(id));
    if (!row) {
      alert('Row not found');
      return;
    }
    
    // Get values from inputs
    const caseNumber = document.getElementById(`edit_case_${id}`).value.trim();
    const complainant = document.getElementById(`edit_complainant_${id}`).value.trim();
    const respondent = document.getElementById(`edit_respondent_${id}`).value.trim();
    
    // Validate NOT NULL fields
    if (!caseNumber || !complainant || !respondent) {
      alert('Case Number, Complainant, and Respondent are required fields.');
      return;
    }
    
    // Get age value - preserve original if empty, but prioritize calculated if birthdate changed
    const ageInput = document.getElementById(`edit_age_${id}`).value.trim();
    const birthdateInput = document.getElementById(`edit_birthdate_${id}`).value;
    
    // If birthdate was entered/changed, use calculated age if age field is empty or matches old age
    let finalAge = null;
    if (birthdateInput) {
      const calculated = calculateAge(birthdateInput);
      if (!ageInput) {
        finalAge = calculated;
      } else {
        // If user manually typed an age, use that, but we could also warn if it differs significantly
        finalAge = parseInt(ageInput);
      }
    } else {
      // If no birthdate, use original or manual input
      finalAge = ageInput ? parseInt(ageInput) : row.age;
    }

    // Get other values - preserve original if empty
    const fileDate = document.getElementById(`edit_file_date_${id}`).value || row.file_date;
    const birthdate = birthdateInput || row.birthdate;
    const contactNumber = document.getElementById(`edit_contact_${id}`).value.trim() || row.contact_number;
    const address = document.getElementById(`edit_address_${id}`).value.trim() || row.address;
    const typeOfAbuse = document.getElementById(`edit_abuse_${id}`).value || row.type_of_abuse;
    const remarks = document.getElementById(`edit_remarks_${id}`).value.trim() || row.remarks;
    
    // Build update object
    const updateData = {
      case_number: caseNumber,
      file_date: fileDate || null,
      complainant: complainant,
      age: finalAge || null,
      birthdate: birthdate || null,
      contact_number: contactNumber || null,
      address: address || null,
      type_of_abuse: typeOfAbuse || null,
      respondent: respondent,
      remarks: remarks || null
    };
    
    try {
      const { data, error } = await sb
        .from('vawc_cases')
        .update(updateData)
        .eq('id', parseInt(id))
        .select()
        .single();
      
      if (error) {
        console.error('Supabase error:', error);
        alert(`Error: ${error.message}\n\nCode: ${error.code}`);
        return;
      }
      
      alert('Updated!');
      editingRowId = null;
      loadData();
    } catch (e) {
      console.error('Exception:', e);
      alert('Error updating: ' + e.message);
    }
  }

  function printRecords() {
    const rowsToPrint = currentVisibleRows.length > 0 ? currentVisibleRows : allRows;
    const fromDate = document.getElementById('dateFrom').value;
    const toDate = document.getElementById('dateTo').value;
    const searchTerm = document.getElementById('searchInput').value;
    
    let dateRangeText = '';
    if (fromDate && toDate) {
      dateRangeText = `Date Range: ${formatDate(fromDate)} to ${formatDate(toDate)}`;
    } else if (fromDate) {
      dateRangeText = `From: ${formatDate(fromDate)}`;
    } else if (toDate) {
      dateRangeText = `To: ${formatDate(toDate)}`;
    } else {
      dateRangeText = 'All Records';
    }
    
    let html = `<div style="padding: 15px;">
      <h2 style="text-align: center;">VAWC Records</h2>
      <p style="text-align: center; margin: 5px 0;"><strong>${dateRangeText}</strong></p>
      <p style="text-align: center; margin: 5px 0;">Total: ${rowsToPrint.length} record(s)</p>
      ${searchTerm ? `<p style="text-align: center; margin: 5px 0; font-size: 12px;">Search: "${searchTerm}"</p>` : ''}
      <table style="width: 100%; border-collapse: collapse; font-size: 10px;">
        <tr style="background: #333; color: #fff;">
          <th>Case</th>
          <th>File Date</th>
          <th>Complainant</th>
          <th>Age</th>
          <th>Birthdate</th>
          <th>Contact</th>
          <th>Address</th>
          <th>Abuse Type</th>
          <th>Respondent</th>
          <th>Remarks</th>
        </tr>`;
    
    rowsToPrint.forEach(row => {
      html += `<tr>
        <td>${row.case_number || ''}</td>
        <td>${formatDate(row.file_date)}</td>
        <td>${row.complainant || ''}</td>
        <td>${row.age || ''}</td>
        <td>${formatDate(row.birthdate)}</td>
        <td>${row.contact_number || ''}</td>
        <td>${row.address || ''}</td>
        <td>${row.type_of_abuse || ''}</td>
        <td>${row.respondent || ''}</td>
        <td>${row.remarks || ''}</td>
      </tr>`;
    });
    
    html += '</table></div>';
    const win = window.open('', '_blank');
    win.document.write(`<html><head><title>VAWC Records Print</title><style>body{font-family:Arial;}</style></head><body>${html}</body></html>`);
    win.document.close();
    win.onload = () => win.print();
  }

  async function deleteRecord(id, caseNum) {
    if (!confirm(`Delete Case #${caseNum}?`)) return;
    try {
      await sb.from('vawc_cases').delete().eq('id', parseInt(id));
      alert('Deleted!');
      loadData();
    } catch (e) { alert('Error deleting'); console.error(e); }
  }

  configureNav();
  loadData();
</script>

</body>
</html>
