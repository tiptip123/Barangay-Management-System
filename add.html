<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Complaint</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      background: #fafafa url('https://raw.githubusercontent.com/tiptip123/Barangay-Management-System/main/tankulan.jpg') no-repeat top center fixed; 
      background-size: contain; 
      margin: 0;
      padding: 20px;
    }
    .container { 
      max-width: 600px; 
      margin: auto; 
      background: rgba(255, 255, 255, 0.95); 
      padding: 2rem; 
      border-radius: 8px; 
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08); 
    }
    h2 { 
      text-align: center; 
      color: #2c3e50; 
      margin-bottom: 1.5rem; 
      margin-top: 0;
    }
    .header { 
      text-align: right; 
      margin-bottom: 1rem; 
    }
    .header a { 
      color: #2c3e50; 
      text-decoration: none; 
      font-weight: 500; 
    }
    .header a:hover { 
      text-decoration: underline; 
    }
    form { 
      display: flex; 
      flex-direction: column; 
      gap: 1rem; 
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .form-group label {
      font-size: 0.9rem;
      color: #555;
      font-weight: 500;
    }
    input, textarea, select { 
      width: 100%; 
      padding: .7rem; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      font-size: 1rem; 
      box-sizing: border-box; 
    }
    input:focus, textarea:focus, select:focus { 
      outline: none; 
      border-color: #2c3e50; 
    }
    button { 
      width: 100%; 
      padding: .8rem; 
      background: #2c3e50; 
      color: #fff; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 1rem; 
      transition: background .2s; 
      font-weight: 600;
    }
    button:hover { 
      background: #1a2838; 
    }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="records.html">← Back to Records</a>
  </div>

  <h2>Add New Complaint</h2>

  <form id="form">
    <div class="form-group">
      <label for="case">Case Number *</label>
      <input id="case" placeholder="Enter case number" required>
    </div>
    
    <div class="form-group">
      <label for="name">Complainant Name *</label>
      <input id="name" placeholder="Full name of complainant" required>
    </div>
    
    <div class="form-group">
      <label for="phone">Phone Number *</label>
      <input id="phone" type="tel" placeholder="09XX-XXX-XXXX" required>
    </div>
    
    <div class="form-group">
      <label for="respondent">Respondent Name *</label>
      <input id="respondent" placeholder="Full name of respondent" required>
    </div>
    
    <div class="form-group">
      <label for="date">Date Filed *</label>
      <input id="date" type="date" required>
    </div>
    
    <div class="form-group">
      <label for="nature">Nature of Complaint *</label>
      <input id="nature" placeholder="Describe the complaint" required>
    </div>
    
    <div class="form-group">
      <label for="settlement">Form of Settlement</label>
      <select id="settlement">
        <option value="">Select Form of Settlement</option>
        <option value="Settled">Settled</option>
        <option value="Dismissed">Dismissed</option>
        <option value="Pending">Pending</option>
        <option value="Mediation">Mediation</option>
        <option value="Arbitration">Arbitration</option>
        <option value="Court Action">Court Action</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="schedule">Schedule of Hearing</label>
      <input id="schedule" type="datetime-local" placeholder="YYYY-MM-DD HH:MM">
    </div>
    
    <div class="form-group">
      <label for="remarks">Remarks</label>
      <textarea id="remarks" placeholder="Additional notes or comments" rows="4"></textarea>
    </div>
    
    <button type="submit">Save Complaint</button>
  </form>
</div>

<script>
  // Check if logged in for blotter
  if (localStorage.getItem('userType') !== 'blotter') {
    window.location.href = 'index.html';
  }

  const supabaseUrl = "https://zalttugtbsqcjshqzfet.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphbHR0dWd0YnNxY2pzaHF6ZmV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTY4OTUsImV4cCI6MjA4ODU3Mjg5NX0.857tB9_t04GuLPHIGBIlew-C8JBjuikgTVtxcK748Z0";
  const sb = supabase.createClient(supabaseUrl, supabaseKey);

  document.getElementById("form").onsubmit = async e => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    const { data: comp, error: compError } = await sb
      .from("complainant")
      .insert([{ complainant_name: name, complainant_phone: phone }])
      .select()
      .single();

    if (compError) { alert('Error: ' + compError.message); return; }

    const { data: blot, error: blotError } = await sb
      .from("blotter")
      .insert([{
        case_number: document.getElementById("case").value,
        complainant_id: comp.id,
        date: document.getElementById("date").value,
        date_filed: document.getElementById("date").value + 'T00:00:00',
        schedule: document.getElementById("schedule").value,
        schedule_hearing: document.getElementById("schedule").value
      }])
      .select()
      .single();

    if (blotError) { alert('Error: ' + blotError.message); return; }

    const { error: detailError } = await sb.from("complaint_details").insert([{
      blotter_id: blot.id,
      respondent: document.getElementById("respondent").value,
      nature_of_complaint: document.getElementById("nature").value,
      form_of_settlement: document.getElementById("settlement").value,
      remarks: document.getElementById("remarks").value
    }]);

    if (detailError) { alert('Error: ' + detailError.message); return; }

    alert("Complaint saved successfully!");
    location.href = "records.html";
  };
</script>

</body>
</html>
