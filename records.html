<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blotter Records</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      background: #fafafa url('https://raw.githubusercontent.com/tiptip123/Barangay-Management-System/main/tankulan.jpg') no-repeat top center fixed; 
      background-size: contain; 
      margin: 0;
      padding: 20px;
    }
    .container { 
      max-width: 1200px; 
      margin: auto; 
      background: rgba(255, 255, 255, 0.95); 
      padding: 2rem; 
      border-radius: 8px; 
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08); 
    }
    h2 { 
      text-align: center; 
      color: #2c3e50; 
      margin-bottom: 1.5rem; 
      margin-top: 0;
    }
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 1.5rem; 
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }
    .header a { 
      color: #2c3e50; 
      text-decoration: none; 
      font-weight: 500; 
    }
    .header a:hover { 
      text-decoration: underline; 
    }
    .header button { 
      background: none; 
      border: none; 
      cursor: pointer; 
      font-size: 1rem; 
      color: #2c3e50; 
      margin-left: 10px;
    }
    .search-bar { 
      text-align: center; 
      margin-bottom: 1.5rem; 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 0.5rem; 
      align-items: center; 
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 6px;
    }
    .search-bar input[type="text"] { 
      width: 280px; 
      padding: .5rem; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
    }
    .search-bar input[type="date"] { 
      padding: .5rem; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
    }
    .search-bar label { 
      font-size: 0.9rem; 
      color: #555; 
      font-weight: 500; 
    }
    .search-bar .date-group { 
      display: flex; 
      align-items: center; 
      gap: 0.5rem; 
    }
    .search-bar .clear-btn { 
      padding: .5rem 1rem; 
      background: #95a5a6; 
      color: #fff; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.9rem; 
    }
    .search-bar .clear-btn:hover { 
      background: #7f8c8d; 
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 1rem; 
      font-size: 0.85rem; 
      background: #fff;
    }
    th, td { 
      border: 1px solid #e0e0e0; 
      padding: .75rem; 
      text-align: left; 
      vertical-align: top; 
    }
    th { 
      background: #2c3e50; 
      color: #fff; 
      white-space: nowrap; 
      font-weight: 600;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    tr:hover {
      background-color: #f1f1f1;
    }
    .action-buttons, .inline-actions { 
      display: flex; 
      gap: 0.3rem; 
    }
    .action-btn { 
      padding: .25rem .5rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.8rem; 
      transition: background .2s; 
    }
    .edit-btn { 
      background: #3498db; 
      color: #fff; 
    }
    .edit-btn:hover { 
      background: #2980b9; 
    }
    .save-btn { 
      background: #27ae60; 
      color: #fff; 
    }
    .save-btn:hover { 
      background: #219a52; 
    }
    .cancel-btn { 
      background: #95a5a6; 
      color: #fff; 
    }
    .cancel-btn:hover { 
      background: #7f8c8d; 
    }
    .delete-btn { 
      background: #e74c3c; 
      color: #fff; 
    }
    .delete-btn:hover { 
      background: #c0392b; 
    }
    .editing {
      background-color: #fff9e6 !important;
      border: 2px solid #f39c12;
    }
    .editing td {
      padding: 0.5rem;
    }
    .editing input, .editing select, .editing textarea {
      width: 100%;
      padding: 0.4rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.85rem;
      box-sizing: border-box;
    }
    .editing textarea {
      min-height: 60px;
      resize: vertical;
    }
    .highlight {
      background-color: #ffeb3b;
      padding: 1px 2px;
      border-radius: 2px;
      font-weight: 600;
    }
    @media print { 
      body { 
        background: none !important; 
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      } 
      .container { 
        box-shadow: none; 
        max-width: 100%; 
        padding: 0; 
        background: #fff; 
      } 
      .header, .search-bar, .action-buttons, .inline-actions { 
        display: none !important; 
      } 
      table { 
        font-size: 9pt; 
        width: 100%;
        border-collapse: collapse;
      } 
      th { 
        background: #2c3e50 !important; 
        color: #ffffff !important; 
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact; 
        font-weight: 700;
        padding: 6px 4px;
        border: 1px solid #000;
        text-transform: uppercase;
      } 
      td { 
        padding: 6px 4px; 
        border: 1px solid #000;
        font-size: 9pt;
      }
      tr {
        page-break-inside: avoid;
      }
      .editing { 
        background-color: #fff !important; 
        border: none !important; 
      }
      input, select, textarea { 
        display: none !important; 
      }
      .highlight { 
        background-color: #fff !important; 
        color: #000 !important; 
      }
    }
    @media (max-width: 900px) { 
      table, thead, tbody, tr, td, th { display: block; width: 100%; } 
      tr { margin-bottom: .8rem; border: 1px solid #ddd; } 
      td { border: none; position: relative; padding-left: 45%; } 
      td::before { content: attr(data-label); position: absolute; left: 0; width: 44%; padding-left: .5rem; font-weight: 600; color: #555; } 
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="index.html">← Back to Home</a>
    <div>
      <a href="add.html" id="addLink" style="display: none;">＋ Add New</a>
      <button onclick="printRecords()" id="printBtn" style="display: none;">🖨️ Print</button>
    </div>
  </div>

  <h2>Blotter Records</h2>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search initials (e.g., 'CN' for Case No) or keywords...">
    <div class="date-group">
      <label for="dateFrom">From:</label>
      <input type="date" id="dateFrom">
      <label for="dateTo">To:</label>
      <input type="date" id="dateTo">
      <button type="button" class="clear-btn" id="clearDateFilter">Clear</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Case No.</th>
        <th>Date Filed</th>
        <th>Complainant</th>
        <th>Respondent</th>
        <th>Nature of Complaint</th>
        <th>Cellphone No.</th>
        <th>Form of Settlement</th>
        <th>Schedule of Hearing</th>
        <th>Remarks</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
  const supabaseUrl = "https://zalttugtbsqcjshqzfet.supabase.co";
  const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphbHR0dWd0YnNxY2pzaHF6ZmV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTY4OTUsImV4cCI6MjA4ODU3Mjg5NX0.857tB9_t04GuLPHIGBIlew-C8JBjuikgTVtxcK748Z0";
  const sb = supabase.createClient(supabaseUrl, supabaseAnonKey);

  const tbody = document.getElementById('tableBody');
  const addLink = document.getElementById('addLink');
  const printBtn = document.getElementById('printBtn');
  let allRows = [];
  let currentVisibleRows = [];
  let editingRowId = null;

  // Helper to extract initials
  function getInitials(str) {
    if (!str) return '';
    return str.trim().split(/\s+/).map(word => word.charAt(0).toUpperCase()).join('');
  }

  // Strict initial matching
  function matchesInitials(text, term) {
    if (!text || !term) return false;
    const initials = getInitials(text);
    return initials.toLowerCase().startsWith(term.toLowerCase());
  }

  function matchesSearchTerm(text, term) {
    if (!text || !term) return false;
    const lowerText = text.toLowerCase();
    const lowerTerm = term.toLowerCase();
    if (matchesInitials(text, term)) return true;
    if (lowerText.includes(lowerTerm)) return true;
    return false;
  }

  function highlightText(text, searchTerm) {
    if (!text || !searchTerm) return text || '';
    const lowerText = text.toLowerCase();
    const lowerTerm = searchTerm.toLowerCase();
    
    if (matchesInitials(text, searchTerm)) {
      let result = '';
      let termIndex = 0;
      const words = text.split(/(\s+)/);
      words.forEach((word) => {
        if (/\s+/.test(word)) {
          result += word;
          return;
        }
        if (termIndex < lowerTerm.length) {
          const firstChar = word.charAt(0);
          const expectedChar = lowerTerm[termIndex];
          if (firstChar.toLowerCase() === expectedChar) {
            result += `<span class="highlight">${firstChar}</span>` + word.slice(1);
            termIndex++;
          } else {
            result += word;
          }
        } else {
          result += word;
        }
      });
      return result;
    } else {
      const escapedTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(`(${escapedTerm})`, 'gi');
      return text.toString().replace(regex, '<span class="highlight">$1</span>');
    }
  }

  function configureNav() {
    const userType = localStorage.getItem('userType');
    const isLoggedIn = userType === 'blotter';
    if (isLoggedIn) {
      addLink.style.display = 'inline';
      printBtn.style.display = 'inline';
    } else {
      addLink.style.display = 'none';
      printBtn.style.display = 'none';
    }
  }

  async function loadData() {
    const { data, error } = await sb.from('blotter').select(`
      id, case_number, date, date_filed, schedule, schedule_hearing,
      complainant:complainant_id (id, complainant_name, complainant_phone),
      complaint_details (*)
    `).order('created_at', { ascending: false });

    if (error) { console.error('Error:', error); return; }
    allRows = data;
    currentVisibleRows = data;
    renderRows(allRows);
  }

  function getDateFiled(row) { return row.date_filed || (row.date ? row.date + 'T00:00:00' : null); }
  function getSchedule(row) { return row.schedule_hearing || (row.schedule ? row.schedule + 'T00:00:00' : null); }

  function formatDateTime(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function formatDateForInput(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toISOString().slice(0, 16);
  }

  function renderRows(rows) {
    tbody.innerHTML = '';
    const isAdmin = localStorage.getItem('userType') === 'blotter';
    const searchTerm = document.getElementById('searchInput').value.trim();
    currentVisibleRows = rows;

    rows.forEach(row => {
      const detail = (row.complaint_details && row.complaint_details[0]) || {};
      const rowIdStr = String(row.id);
      const isEditing = (editingRowId !== null) && (rowIdStr === String(editingRowId));

      let actionsHtml = '';
      if (isAdmin) {
        if (isEditing) {
          actionsHtml = `
            <div class="inline-actions">
              <button class="action-btn save-btn" data-id="${row.id}">✓ Save</button>
              <button class="action-btn cancel-btn" data-id="${row.id}">✕ Cancel</button>
            </div>
          `;
        } else {
          actionsHtml = `
            <div class="action-buttons">
              <button class="action-btn edit-btn" data-id="${row.id}">✏️ Edit</button>
              <button class="action-btn delete-btn" data-id="${row.id}" data-case="${row.case_number}">🗑️</button>
            </div>
          `;
        }
      } else {
        actionsHtml = '<span style="color: #999;">View Only</span>';
      }
      
      const tr = document.createElement('tr');
      if (isEditing) {
        tr.className = 'editing';
      }
      
      // Highlighting
      const caseNo = highlightText(row.case_number, searchTerm);
      const complainantName = highlightText(row.complainant?.complainant_name, searchTerm);
      const respondent = highlightText(detail.respondent, searchTerm);
      const nature = highlightText(detail.nature_of_complaint, searchTerm);
      const settlement = highlightText(detail.form_of_settlement, searchTerm);
      const remarks = highlightText(detail.remarks, searchTerm);
      const phone = highlightText(row.complainant?.complainant_phone, searchTerm);

      tr.innerHTML = `
        <td data-label="Case No.">${isEditing ? `<input type="text" id="edit_case_number" value="${row.case_number || ''}">` : caseNo}</td>
        <td data-label="Date Filed">${isEditing ? `<input type="datetime-local" id="edit_date_filed" value="${formatDateForInput(getDateFiled(row))}">` : formatDateTime(getDateFiled(row))}</td>
        <td data-label="Complainant">${isEditing ? `<input type="text" id="edit_complainant_name" value="${row.complainant?.complainant_name || ''}">` : complainantName}</td>
        <td data-label="Respondent">${isEditing ? `<input type="text" id="edit_respondent" value="${detail.respondent || ''}">` : respondent}</td>
        <td data-label="Nature of Complaint">${isEditing ? `<input type="text" id="edit_nature" value="${detail.nature_of_complaint || ''}">` : nature}</td>
        <td data-label="Cellphone No.">${isEditing ? `<input type="tel" id="edit_complainant_phone" value="${row.complainant?.complainant_phone || ''}">` : phone}</td>
        <td data-label="Form of Settlement">${isEditing ? `
          <select id="edit_settlement">
            <option value="">Select Settlement</option>
            <option value="Settled" ${detail.form_of_settlement === 'Settled' ? 'selected' : ''}>Settled</option>
            <option value="Dismissed" ${detail.form_of_settlement === 'Dismissed' ? 'selected' : ''}>Dismissed</option>
            <option value="Pending" ${detail.form_of_settlement === 'Pending' ? 'selected' : ''}>Pending</option>
            <option value="Mediation" ${detail.form_of_settlement === 'Mediation' ? 'selected' : ''}>Mediation</option>
            <option value="Arbitration" ${detail.form_of_settlement === 'Arbitration' ? 'selected' : ''}>Arbitration</option>
            <option value="Court Action" ${detail.form_of_settlement === 'Court Action' ? 'selected' : ''}>Court Action</option>
          </select>` : settlement}</td>
        <td data-label="Schedule of Hearing">${isEditing ? `<input type="datetime-local" id="edit_schedule_hearing" value="${formatDateForInput(getSchedule(row))}">` : formatDateTime(getSchedule(row))}</td>
        <td data-label="Remarks">${isEditing ? `<textarea id="edit_remarks">${detail.remarks || ''}</textarea>` : remarks}</td>
        <td data-label="Actions">${actionsHtml}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  document.getElementById('searchInput').addEventListener('input', filterRecords);
  document.getElementById('dateFrom').addEventListener('change', filterRecords);
  document.getElementById('dateTo').addEventListener('change', filterRecords);
  document.getElementById('clearDateFilter').addEventListener('click', () => {
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    filterRecords();
  });

  function filterRecords() {
  const term = document.getElementById('searchInput').value.trim();
  const fromDate = document.getElementById('dateFrom').value;
  const toDate = document.getElementById('dateTo').value;
  
  // If no search term, just apply date filters or show all
  if (!term) {
    const filtered = allRows.filter(row => {
      let matchesDate = true;
      if (fromDate || toDate) {
        const recordDate = getDateFiled(row);
        if (!recordDate) return false; // Skip if no date
        
        // Extract just the YYYY-MM-DD part for comparison
        const recordDateOnly = recordDate.split('T')[0];
        
        if (fromDate && toDate) {
          matchesDate = recordDateOnly >= fromDate && recordDateOnly <= toDate;
        } else if (fromDate) {
          matchesDate = recordDateOnly >= fromDate;
        } else if (toDate) {
          matchesDate = recordDateOnly <= toDate;
        }
      }
      return matchesDate;
    });
    renderRows(filtered);
    return;
  }

  const filtered = allRows.filter(row => {
    const detail = (row.complaint_details && row.complaint_details[0]) || {};
    const matchesSearch = 
      matchesSearchTerm(row.case_number, term) || 
      matchesSearchTerm(row.complainant?.complainant_name, term) || 
      matchesSearchTerm(detail.respondent, term) ||
      matchesSearchTerm(detail.nature_of_complaint, term) ||
      matchesSearchTerm(detail.form_of_settlement, term);
    
    let matchesDate = true;
    if (fromDate || toDate) {
      const recordDate = getDateFiled(row);
      if (!recordDate) return false; // Skip if no date
      
      // Extract just the YYYY-MM-DD part for comparison
      const recordDateOnly = recordDate.split('T')[0];
      
      if (fromDate && toDate) {
        matchesDate = recordDateOnly >= fromDate && recordDateOnly <= toDate;
      } else if (fromDate) {
        matchesDate = recordDateOnly >= fromDate;
      } else if (toDate) {
        matchesDate = recordDateOnly <= toDate;
      }
    }
    return matchesSearch && matchesDate;
  });
  
  renderRows(filtered);
}

  // Event delegation
  tbody.addEventListener('click', function(e) {
    const target = e.target;
    if (target.classList.contains('edit-btn')) {
      const id = target.dataset.id;
      startInlineEdit(id);
      return;
    }
    if (target.classList.contains('save-btn')) {
      const id = target.dataset.id;
      saveInlineEdit(id);
      return;
    }
    if (target.classList.contains('cancel-btn')) {
      const id = target.dataset.id;
      cancelInlineEdit(id);
      return;
    }
    if (target.classList.contains('delete-btn')) {
      const id = target.dataset.id;
      const caseNum = target.dataset.case;
      deleteRecord(id, caseNum);
      return;
    }
  });

  function startInlineEdit(id) {
    if (editingRowId && String(editingRowId) !== String(id)) {
      cancelInlineEdit(editingRowId);
    }
    editingRowId = id;
    renderRows(currentVisibleRows);
  }

  function cancelInlineEdit(id) {
    editingRowId = null;
    renderRows(currentVisibleRows);
  }

  async function saveInlineEdit(id) {
    const row = allRows.find(r => String(r.id) === String(id));
    if (!row) {
      alert('Row not found');
      return;
    }
    const detail = (row.complaint_details && row.complaint_details[0]) || {};
    
    const caseNumber = document.getElementById('edit_case_number').value.trim();
    const complainantName = document.getElementById('edit_complainant_name').value.trim();
    const complainantPhone = document.getElementById('edit_complainant_phone').value.trim();
    const respondent = document.getElementById('edit_respondent').value.trim();
    const nature = document.getElementById('edit_nature').value.trim();
    const settlement = document.getElementById('edit_settlement').value;
    const remarks = document.getElementById('edit_remarks').value.trim();
    const dateFiled = document.getElementById('edit_date_filed').value || null;
    const schedule = document.getElementById('edit_schedule_hearing').value || null;

    if (!caseNumber || !complainantName || !respondent) {
      alert('Case Number, Complainant, and Respondent are required.');
      return;
    }

    try {
      // 1. Update Complainant
      await sb.from('complainant').update({ 
        complainant_name: complainantName, 
        complainant_phone: complainantPhone 
      }).eq('id', row.complainant.id);

      // 2. Update Blotter
      await sb.from('blotter').update({ 
        case_number: caseNumber, 
        date_filed: dateFiled, 
        schedule_hearing: schedule 
      }).eq('id', id);

      // 3. Update Details
      await sb.from('complaint_details').update({ 
        respondent: respondent, 
        nature_of_complaint: nature, 
        form_of_settlement: settlement, 
        remarks: remarks 
      }).eq('id', detail.id);

      alert('Updated!');
      editingRowId = null;
      loadData();
    } catch (e) {
      console.error(e);
      alert('Error updating: ' + e.message);
    }
  }

  async function deleteRecord(id, caseNum) {
    if (!confirm(`Delete Case #${caseNum}?`)) return;
    try {
      const { data: details } = await sb.from('complaint_details').select('id').eq('blotter_id', id);
      if (details?.length) await sb.from('complaint_details').delete().eq('blotter_id', id);
      const { data: blot } = await sb.from('blotter').select('complainant_id').eq('id', id).single();
      await sb.from('blotter').delete().eq('id', id);
      if (blot?.complainant_id) await sb.from('complainant').delete().eq('id', blot.complainant_id);
      alert('Deleted!');
      loadData();
    } catch (e) { alert('Error deleting'); console.error(e); }
  }

  function printRecords() {
    const rowsToPrint = currentVisibleRows.length > 0 ? currentVisibleRows : allRows;
    const fromDate = document.getElementById('dateFrom').value;
    const toDate = document.getElementById('dateTo').value;
    const searchTerm = document.getElementById('searchInput').value;
    
    let dateRangeText = '';
    if (fromDate && toDate) {
      dateRangeText = `Date Range: ${new Date(fromDate).toLocaleDateString()} to ${new Date(toDate).toLocaleDateString()}`;
    } else if (fromDate) {
      dateRangeText = `From: ${new Date(fromDate).toLocaleDateString()}`;
    } else if (toDate) {
      dateRangeText = `To: ${new Date(toDate).toLocaleDateString()}`;
    } else {
      dateRangeText = 'All Records';
    }

    let html = `<!DOCTYPE html>
<html>
<head>
  <title>Blotter Records Print</title>
  <style>
    body { font-family: Arial, sans-serif; font-size: 9pt; margin: 15px; -webkit-font-smoothing: antialiased; }
    h2 { text-align: center; margin-bottom: 10px; color: #2c3e50; }
    .info { text-align: center; margin: 5px 0; font-size: 10pt; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 9pt; }
    th { background: #2c3e50 !important; color: #ffffff !important; padding: 6px 4px; border: 1px solid #000; font-weight: 700; text-transform: uppercase; -webkit-print-color-adjust: exact; }
    td { padding: 6px 4px; border: 1px solid #000; font-size: 9pt; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    tr { page-break-inside: avoid; }
  </style>
</head>
<body>
  <h2>Blotter Records</h2>
  <div class="info"><strong>${dateRangeText}</strong></div>
  <div class="info">Total: ${rowsToPrint.length} record(s)</div>
  ${searchTerm ? `<div class="info" style="font-size: 8pt;">Search: "${searchTerm}"</div>` : ''}
  <table>
    <thead>
      <tr>
        <th>Case No.</th>
        <th>Date Filed</th>
        <th>Complainant</th>
        <th>Respondent</th>
        <th>Nature</th>
        <th>Phone</th>
        <th>Settlement</th>
        <th>Schedule</th>
        <th>Remarks</th>
      </tr>
    </thead>
    <tbody>`;
    
    rowsToPrint.forEach(row => {
      const d = (row.complaint_details && row.complaint_details[0]) || {};
      html += `<tr>
        <td>${row.case_number || ''}</td>
        <td>${formatDateTime(getDateFiled(row))}</td>
        <td>${row.complainant?.complainant_name || ''}</td>
        <td>${d.respondent || ''}</td>
        <td>${d.nature_of_complaint || ''}</td>
        <td>${row.complainant?.complainant_phone || ''}</td>
        <td>${d.form_of_settlement || ''}</td>
        <td>${formatDateTime(getSchedule(row))}</td>
        <td>${d.remarks || ''}</td>
      </tr>`;
    });
    
    html += `</tbody>
  </table>
</body>
</html>`;
    
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    win.onload = () => win.print();
  }

  configureNav();
  loadData();
</script>

</body>
</html>
