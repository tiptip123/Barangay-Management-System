<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blotter Records</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      background: #fafafa url('https://raw.githubusercontent.com/tiptip123/Barangay-Management-System/main/tankulan.jpg') no-repeat top center fixed; 
      background-size: contain; 
      margin: 0;
      padding: 20px;
    }
    .container { 
      max-width: 1200px; 
      margin: auto; 
      background: rgba(255, 255, 255, 0.95);
      padding: 2rem; 
      border-radius: 8px; 
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08); 
    }
    h2 { 
      text-align: center; 
      color: #2c3e50; 
      margin-bottom: 1.5rem; 
      margin-top: 0;
    }
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 1.5rem; 
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }
    .header a { 
      color: #2c3e50; 
      text-decoration: none; 
      font-weight: 500; 
    }
    .header a:hover { 
      text-decoration: underline; 
    }
    .header button { 
      background: none; 
      border: none; 
      cursor: pointer; 
      font-size: 1rem; 
      color: #2c3e50; 
      margin-left: 10px;
    }
    .search-bar { 
      text-align: center; 
      margin-bottom: 1.5rem; 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 0.5rem; 
      align-items: center; 
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 6px;
    }
    .search-bar input[type="text"] { 
      width: 280px; 
      padding: .5rem; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
    }
    .search-bar input[type="date"] { 
      padding: .5rem; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
    }
    .search-bar label { 
      font-size: 0.9rem; 
      color: #555; 
      font-weight: 500; 
    }
    .search-bar .date-group { 
      display: flex; 
      align-items: center; 
      gap: 0.5rem; 
    }
    .search-bar .clear-btn { 
      padding: .5rem 1rem; 
      background: #95a5a6; 
      color: #fff; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.9rem; 
    }
    .search-bar .clear-btn:hover { 
      background: #7f8c8d; 
    }
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 1rem; 
      font-size: 0.9rem; 
      background: #fff;
    }
    th, td { 
      border: 1px solid #e0e0e0; 
      padding: .75rem; 
      text-align: left; 
      vertical-align: top; 
    }
    th { 
      background: #2c3e50; 
      color: #fff; 
      white-space: nowrap; 
      font-weight: 600;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    tr:hover {
      background-color: #f1f1f1;
    }
    .action-buttons { 
      display: flex; 
      gap: 0.3rem; 
    }
    .action-btn { 
      padding: .25rem .5rem; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.8rem; 
      transition: background .2s; 
    }
    .edit-btn { 
      background: #3498db; 
      color: #fff; 
    }
    .edit-btn:hover { 
      background: #2980b9; 
    }
    .delete-btn { 
      background: #e74c3c; 
      color: #fff; 
    }
    .delete-btn:hover { 
      background: #c0392b; 
    }
    .modal { 
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(0, 0, 0, 0.5); 
      align-items: center; 
      justify-content: center; 
      z-index: 1000; 
    }
    .modal.active { 
      display: flex; 
    }
    .modal-content { 
      background: #fff; 
      padding: 2rem; 
      border-radius: 8px; 
      max-width: 600px; 
      width: 90%; 
      box-shadow: 0 4px 12px rgba(0, 0, 0, .2); 
      position: relative; 
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-content h3 { 
      margin-top: 0; 
      color: #2c3e50; 
      margin-bottom: 1.5rem;
    }
    .close-btn { 
      position: absolute; 
      top: .5rem; 
      right: .5rem; 
      background: none; 
      border: none; 
      font-size: 1.5rem; 
      cursor: pointer; 
      color: #777; 
    }
    .close-btn:hover { 
      color: #000; 
    }
    form.edit-form { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
      gap: 1rem; 
    }
    form.edit-form input, form.edit-form textarea, form.edit-form select { 
      padding: .6rem; 
      font-size: 1rem; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
      width: 100%;
      box-sizing: border-box;
    }
    form.edit-form textarea { 
      grid-column: 1 / -1; 
      min-height: 80px;
      resize: vertical;
    }
    form.edit-form button { 
      grid-column: 1 / -1; 
      background: #2c3e50; 
      color: #fff; 
      border: none; 
      cursor: pointer; 
      padding: .8rem; 
      font-size: 1rem; 
      border-radius: 4px; 
      transition: background .2s; 
      font-weight: 600;
    }
    form.edit-form button:hover { 
      background: #1a2838; 
    }
    @media print { 
      body { background: none !important; } 
      .container { box-shadow: none; max-width: 100%; padding: 0; background: #fff; } 
      .header, .search-bar, .action-buttons, .modal { display: none !important; } 
      table { font-size: 0.75rem; } 
      th { background: #333 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; } 
    }
    @media (max-width: 900px) { 
      table, thead, tbody, tr, td, th { display: block; width: 100%; } 
      tr { margin-bottom: .8rem; border: 1px solid #ddd; } 
      td { border: none; position: relative; padding-left: 45%; } 
      td::before { content: attr(data-label); position: absolute; left: 0; width: 44%; padding-left: .5rem; font-weight: 600; color: #555; } 
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <a href="index.html">← Back to Home</a>
    <div>
      <a href="add.html" id="addLink" style="display: none;">＋ Add New</a>
      <button onclick="printRecords()" id="printBtn" style="display: none;">🖨️ Print</button>
    </div>
  </div>

  <h2>Blotter Records</h2>
  
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search Case #, Complainant, Respondent…">
    <div class="date-group">
      <label for="dateFrom">From:</label>
      <input type="date" id="dateFrom">
      <label for="dateTo">To:</label>
      <input type="date" id="dateTo">
      <button type="button" class="clear-btn" id="clearDateFilter">Clear</button>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Case No.</th>
        <th>Date Filed</th>
        <th>Complainant</th>
        <th>Respondent</th>
        <th>Nature of Complaint</th>
        <th>Cellphone No.</th>
        <th>Form of Settlement</th>
        <th>Schedule of Hearing</th>
        <th>Remarks</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <button class="close-btn" id="closeModal">&times;</button>
    <h3>Edit Complaint</h3>
    <form class="edit-form" id="editForm">
      <input type="hidden" id="edit_complainant_id">
      <input type="hidden" id="edit_blotter_id">
      <input type="hidden" id="edit_detail_id">
      <input type="text" id="edit_case_number" placeholder="Case Number" required>
      <input type="datetime-local" id="edit_date_filed" placeholder="Date Filed" required>
      <input type="text" id="edit_complainant_name" placeholder="Complainant Name" required>
      <input type="tel" id="edit_complainant_phone" placeholder="Cellphone Number" required>
      <input type="text" id="edit_respondent" placeholder="Respondent" required>
      <input type="text" id="edit_nature" placeholder="Nature of Complaint" required>
      <select id="edit_settlement">
        <option value="">Select Form of Settlement</option>
        <option value="Settled">Settled</option>
        <option value="Dismissed">Dismissed</option>
        <option value="Pending">Pending</option>
        <option value="Mediation">Mediation</option>
        <option value="Arbitration">Arbitration</option>
        <option value="Court Action">Court Action</option>
      </select>
      <input type="datetime-local" id="edit_schedule_hearing" placeholder="Schedule of Hearing">
      <textarea id="edit_remarks" placeholder="Remarks"></textarea>
      <button type="submit">Save Changes</button>
    </form>
  </div>
</div>

<script>
  const supabaseUrl = "https://zalttugtbsqcjshqzfet.supabase.co";
  const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphbHR0dWd0YnNxY2pzaHF6ZmV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5OTY4OTUsImV4cCI6MjA4ODU3Mjg5NX0.857tB9_t04GuLPHIGBIlew-C8JBjuikgTVtxcK748Z0";
  const sb = supabase.createClient(supabaseUrl, supabaseAnonKey);

  const tbody = document.getElementById('tableBody');
  const addLink = document.getElementById('addLink');
  const printBtn = document.getElementById('printBtn');
  let allRows = [];
  let currentVisibleRows = []; // NEW: Track currently displayed rows

  function configureNav() {
    const isLoggedIn = localStorage.getItem('userType') === 'blotter';
    if (isLoggedIn) {
      addLink.style.display = 'inline';
      printBtn.style.display = 'inline';
    } else {
      addLink.style.display = 'none';
      printBtn.style.display = 'none';
    }
  }

  async function loadData() {
    const { data, error } = await sb.from('blotter').select(`
      id, case_number, date, date_filed, schedule, schedule_hearing,
      complainant:complainant_id (id, complainant_name, complainant_phone),
      complaint_details (*)
    `).order('created_at', { ascending: false });

    if (error) { console.error('Error:', error); return; }
    allRows = data;
    currentVisibleRows = data; // Initialize visible rows
    renderRows(allRows);
  }

  function getDateFiled(row) { return row.date_filed || (row.date ? row.date + 'T00:00:00' : null); }
  function getSchedule(row) { return row.schedule_hearing || (row.schedule ? row.schedule + 'T00:00:00' : null); }

  function renderRows(rows) {
    tbody.innerHTML = '';
    const isAdmin = localStorage.getItem('userType') === 'blotter';
    
    // Update the global visible rows tracker
    currentVisibleRows = rows;

    rows.forEach(row => {
      const detail = (row.complaint_details && row.complaint_details[0]) || {};
      let actionsHtml = isAdmin 
        ? `<div class="action-buttons"><button class="action-btn edit-btn" data-row-id="${row.id}">✏️ Edit</button><button class="action-btn delete-btn" data-row-id="${row.id}" data-case="${row.case_number}">🗑️</button></div>`
        : '<span style="color: #999;">View Only</span>';
      
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td data-label="Case No.">${row.case_number ?? ''}</td>
        <td data-label="Date Filed">${formatDateTime(getDateFiled(row))}</td>
        <td data-label="Complainant">${row.complainant?.complainant_name ?? ''}</td>
        <td data-label="Respondent">${detail.respondent ?? ''}</td>
        <td data-label="Nature of Complaint">${detail.nature_of_complaint ?? ''}</td>
        <td data-label="Cellphone No.">${row.complainant?.complainant_phone ?? ''}</td>
        <td data-label="Form of Settlement">${detail.form_of_settlement ?? ''}</td>
        <td data-label="Schedule of Hearing">${formatDateTime(getSchedule(row))}</td>
        <td data-label="Remarks">${detail.remarks ?? ''}</td>
        <td data-label="Actions">${actionsHtml}</td>
      `;
      tbody.appendChild(tr);
    });
    
    // Re-attach event listeners
    document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEditModal(btn.dataset.rowId)));
    document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteRecord(btn.dataset.rowId, btn.dataset.case)));
  }

  function formatDateTime(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function formatDateForInput(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toISOString().slice(0, 16);
  }

  document.getElementById('searchInput').addEventListener('input', filterRecords);
  document.getElementById('dateFrom').addEventListener('change', filterRecords);
  document.getElementById('dateTo').addEventListener('change', filterRecords);
  document.getElementById('clearDateFilter').addEventListener('click', () => {
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value = '';
    filterRecords();
  });

  function filterRecords() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const fromDate = document.getElementById('dateFrom').value;
    const toDate = document.getElementById('dateTo').value;
    const filtered = allRows.filter(row => {
      const detail = (row.complaint_details && row.complaint_details[0]) || {};
      const matchesSearch = row.case_number?.toLowerCase().includes(term) || row.complainant?.complainant_name?.toLowerCase().includes(term) || detail.respondent?.toLowerCase().includes(term) || detail.nature_of_complaint?.toLowerCase().includes(term);
      let matchesDate = true;
      if (fromDate || toDate) {
        const recordDate = getDateFiled(row)?.split('T')[0] || '';
        if (fromDate && toDate) matchesDate = recordDate >= fromDate && recordDate <= toDate;
        else if (fromDate) matchesDate = recordDate >= fromDate;
        else if (toDate) matchesDate = recordDate <= toDate;
      }
      return matchesSearch && matchesDate;
    });
    renderRows(filtered);
  }

  function printRecords() {
    // Use currentVisibleRows (filtered data) instead of allRows (full database)
    const rowsToPrint = currentVisibleRows.length > 0 ? currentVisibleRows : allRows;
    
    let html = `<div style="padding: 15px;"><h2 style="text-align: center;">Blotter Records</h2><p>Total: ${rowsToPrint.length}</p><table style="width: 100%; border-collapse: collapse; font-size: 10px;"><tr style="background: #333; color: #fff;"><th>Case</th><th>Date</th><th>Complainant</th><th>Respondent</th><th>Nature</th><th>Phone</th><th>Settlement</th><th>Schedule</th><th>Remarks</th></tr>`;
    
    rowsToPrint.forEach(row => {
      const d = (row.complaint_details && row.complaint_details[0]) || {};
      html += `<tr><td>${row.case_number || ''}</td><td>${formatDateTime(getDateFiled(row))}</td><td>${row.complainant?.complainant_name || ''}</td><td>${d.respondent || ''}</td><td>${d.nature_of_complaint || ''}</td><td>${row.complainant?.complainant_phone || ''}</td><td>${d.form_of_settlement || ''}</td><td>${formatDateTime(getSchedule(row))}</td><td>${d.remarks || ''}</td></tr>`;
    });
    
    html += '</table></div>';
    const win = window.open('', '_blank');
    win.document.write(`<html><head><title>Print</title><style>body{font-family:Arial;}</style></head><body>${html}</body></html>`);
    win.document.close();
    win.onload = () => win.print();
  }

  async function deleteRecord(id, caseNum) {
    if (!confirm(`Delete Case #${caseNum}?`)) return;
    try {
      const { data: details } = await sb.from('complaint_details').select('id').eq('blotter_id', id);
      if (details?.length) await sb.from('complaint_details').delete().eq('blotter_id', id);
      const { data: blot } = await sb.from('blotter').select('complainant_id').eq('id', id).single();
      await sb.from('blotter').delete().eq('id', id);
      if (blot?.complainant_id) await sb.from('complainant').delete().eq('id', blot.complainant_id);
      alert('Deleted!');
      loadData();
    } catch (e) { alert('Error deleting'); console.error(e); }
  }

  const editModal = document.getElementById('editModal');
  document.getElementById('closeModal').addEventListener('click', () => editModal.classList.remove('active'));
  editModal.addEventListener('click', e => { if (e.target === editModal) editModal.classList.remove('active'); });

  function openEditModal(rowId) {
    const row = allRows.find(r => r.id == rowId);
    if (!row) return;
    const d = (row.complaint_details && row.complaint_details[0]) || {};
    document.getElementById('edit_complainant_id').value = row.complainant?.id || '';
    document.getElementById('edit_blotter_id').value = row.id;
    document.getElementById('edit_detail_id').value = d.id || '';
    document.getElementById('edit_case_number').value = row.case_number || '';
    document.getElementById('edit_date_filed').value = formatDateForInput(getDateFiled(row));
    document.getElementById('edit_complainant_name').value = row.complainant?.complainant_name || '';
    document.getElementById('edit_complainant_phone').value = row.complainant?.complainant_phone || '';
    document.getElementById('edit_respondent').value = d.respondent || '';
    document.getElementById('edit_nature').value = d.nature_of_complaint || '';
    document.getElementById('edit_settlement').value = d.form_of_settlement || '';
    document.getElementById('edit_schedule_hearing').value = formatDateForInput(getSchedule(row));
    document.getElementById('edit_remarks').value = d.remarks || '';
    editModal.classList.add('active');
  }

  document.getElementById('editForm').addEventListener('submit', async e => {
    e.preventDefault();
    const compId = document.getElementById('edit_complainant_id').value;
    const blotId = document.getElementById('edit_blotter_id').value;
    const detailId = document.getElementById('edit_detail_id').value;
    
    // Update Complainant
    await sb.from('complainant').update({ 
      complainant_name: document.getElementById('edit_complainant_name').value.trim(), 
      complainant_phone: document.getElementById('edit_complainant_phone').value.trim() 
    }).eq('id', compId);
    
    // Update Blotter
    await sb.from('blotter').update({ 
      case_number: document.getElementById('edit_case_number').value.trim(), 
      date_filed: document.getElementById('edit_date_filed').value || null, 
      schedule_hearing: document.getElementById('edit_schedule_hearing').value || null 
    }).eq('id', blotId);
    
    // Update Details
    await sb.from('complaint_details').update({ 
      respondent: document.getElementById('edit_respondent').value.trim(), 
      nature_of_complaint: document.getElementById('edit_nature').value.trim(), 
      form_of_settlement: document.getElementById('edit_settlement').value || null, 
      remarks: document.getElementById('edit_remarks').value.trim() || null 
    }).eq('id', detailId);
    
    alert('Updated!');
    editModal.classList.remove('active');
    loadData();
  });

  configureNav();
  loadData();
</script>

</body>
</html>
